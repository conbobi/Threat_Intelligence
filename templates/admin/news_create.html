<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng bài viết mới</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0b1a2a, #0f2a44);
            color: white;
            min-height: 100vh;
        }
        .container-box {
            padding: 2rem;
        }
        .card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            border: none;
            color: white;
        }
        .form-control, .form-select, textarea {
            background: rgba(255,255,255,0.08);
            color: white;
            border: 1px solid rgba(255,255,255,0.15);
        }
        .form-control:focus, .form-select:focus, textarea:focus {
            background: rgba(255,255,255,0.08);
            color: white;
            border-color: #6ea8fe;
            box-shadow: none;
        }
        .form-control::placeholder,
        textarea::placeholder {
            color: rgba(255,255,255,0.6);
        }
    </style>
</head>
<body>
    <div class="container-box">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="bi bi-plus-circle"></i> Đăng bài viết mới</h2>
            <a href="/admin/news" class="btn btn-outline-light">
                <i class="bi bi-arrow-left"></i> Về danh sách tin
            </a>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert alert-{{ 'danger' if category=='error' else 'success' }} alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <div class="card">
            <div class="card-body">
                <form method="POST" action="/admin/news/create">
                    <div class="mb-3">
                        <label class="form-label">Tiêu đề</label>
                        <input type="text" name="tieu_de" class="form-control" placeholder="Nhập tiêu đề bài viết" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Mô tả ngắn</label>
                        <textarea name="mo_ta_ngan" class="form-control" rows="3" placeholder="Nhập mô tả ngắn" required></textarea>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Nội dung chi tiết</label>
                        <textarea name="noi_dung_chi_tiet" class="form-control" rows="8" placeholder="Nhập nội dung bài viết" required></textarea>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">URL hình ảnh minh họa</label>
                        <input type="text" name="hinh_anh_minh_hoa" class="form-control" placeholder="https://...">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Trạng thái</label>
                            <select name="trang_thai" class="form-select">
                                <option value="published">Hiện</option>
                                <option value="draft">Ẩn</option>
                            </select>
                    </div>

                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-upload"></i> Đăng bài
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
