<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Threat Intelligence</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/site.css') }}" rel="stylesheet">
</head>
<body>

<div class="container">
    <!-- MENU GÓC PHẢI -->
    <div class="d-flex justify-content-end mt-4 mb-4">
        <div class="d-flex align-items-center gap-4 px-3 py-2 rounded"
             style="background: rgba(255,255,255,0.05); backdrop-filter: blur(8px);">
            <a href="#" class="text-decoration-none text-light d-flex align-items-center gap-1">
                <i class="bi bi-question-circle-fill"></i>
                <span>Hướng dẫn</span>
            </a>
            <a href="#" class="text-decoration-none text-light d-flex align-items-center gap-1">
                <i class="bi bi-envelope-fill"></i>
                <span>Liên hệ</span>
            </a>
            <a href="#" class="text-decoration-none text-light d-flex align-items-center gap-1">
                <i class="bi bi-info-circle-fill"></i>
                <span>Giới thiệu</span>
            </a>
            <div id="authArea">
                <a href="/auth/login" class="btn btn-outline-light">Đăng nhập</a>
            </div>
        </div>
    </div>

    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="hero-box text-center">
                <h2 class="mb-4">🛡️ MÁY QUÉT MÃ ĐỘC ĐA LUỒNG</h2>
                <p class="text-secondary mb-4">Phân tích URL và Tệp tin dựa trên cơ sở dữ liệu toàn cầu.</p>
                
                <ul class="nav nav-tabs justify-content-center" id="scanTabs" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active" id="url-tab" data-bs-toggle="tab" data-bs-target="#url-pane" type="button" role="tab">🔗 Quét Tên Miền (URL)</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="file-tab" data-bs-toggle="tab" data-bs-target="#file-pane" type="button" role="tab">📁 Quét Tệp Tin (File)</button>
                    </li>
                </ul>

                <div class="tab-content" id="myTabContent">
                    <div class="tab-pane fade show active" id="url-pane" role="tabpanel">
                        <div class="input-group input-group-lg mb-3">
                            <input type="text" id="urlInput" class="form-control bg-dark text-light border-secondary" placeholder="Nhập đường link (VD: google.com)...">
                            <button class="btn btn-scan text-white" id="scanUrlBtn" onclick="startUrlScan()">
                                <span class="spinner-border spinner-border-sm me-2" id="urlSpinner"></span>QUÉT URL
                            </button>
                        </div>
                    </div>

                    <div class="tab-pane fade" id="file-pane" role="tabpanel">
                        <div class="input-group input-group-lg mb-3">
                            <input type="file" id="fileInput" class="form-control bg-dark text-light border-secondary">
                            <button class="btn btn-scan text-white" id="scanFileBtn" onclick="startFileScan()">
                                <span class="spinner-border spinner-border-sm me-2" id="fileSpinner"></span>QUÉT FILE
                            </button>
                        </div>
                    </div>
                </div>

                <div id="resultArea" class="result-box text-start">
                    <div class="d-flex justify-content-between align-items-center border-bottom border-secondary pb-3 mb-3">
                        <h4 class="mb-0">Kết Quả Phân Tích</h4>
                        <span id="finalStatus" class="status-badge AN_TOAN">ĐANG CHỜ...</span>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6">
                            <h6 class="text-primary">Chi tiết kiểm tra:</h6>
                            <ul id="detailsList" class="text-secondary" style="font-size: 0.9rem;"></ul>
                            <p class="mt-3 text-secondary" style="font-size: 0.85rem;">⏱️ Thời gian quét: <span id="scanTime" class="text-light font-monospace">0.0</span> giây</p>
                        </div>
                        <div class="col-md-6">
                            <h6 class="text-warning">Lời khuyên từ chuyên gia:</h6>
                            <div id="adviceText" class="p-3 rounded bg-dark text-light" style="white-space: pre-line; font-size: 0.9rem;"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='js/auth.js') }}"></script>
<script src="{{ url_for('static', filename='js/scan.js') }}"></script>
</body>
</html>
