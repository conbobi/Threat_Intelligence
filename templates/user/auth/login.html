<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/auth.css') }}" rel="stylesheet">
</head>
<body>

<div class="login-box text-center">
    <h3 class="mb-4"><i class="bi bi-shield-lock-fill"></i> Đăng nhập</h3>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ 'danger' if category=='error' else 'success' }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <div class="mb-3 text-start">
        <label class="form-label">Email</label>
        <input type="email" id="email" class="form-control" placeholder="Nhập email">
    </div>

    <div class="mb-3 text-start">
        <label class="form-label">Mật khẩu</label>
        <input type="password" id="password" class="form-control" placeholder="Nhập mật khẩu">
    </div>

    <button onclick="login()" class="btn btn-login w-100 text-white mb-3">
        <i class="bi bi-box-arrow-in-right"></i> Đăng nhập
    </button>

    <div class="divider">hoặc</div>

    <button type="button" onclick="loginWithGoogle()" class="btn google-btn w-100 mb-3">
        <i class="bi bi-google"></i> Đăng nhập bằng Google
    </button>

    <p class="mb-0">
        Chưa có tài khoản? <a href="/auth/register">Đăng ký</a>
    </p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="{{ url_for('static', filename='js/auth.js') }}"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
