<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch Sử Quét - Hệ Thống Threat Intelligence</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .menu-link
        {
            text-decoration: none;
            color: #f8fafc;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.2s ease;
            padding: 6px 12px;
            border-radius: 6px;
        }

        .menu-link:hover {
            color: #3b82f6;
            background: rgba(59, 130, 246, 0.1);
        }
        .hero-box {
            background: #1e293b;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-top: 30px;
            border-top: 4px solid #3b82f6;
        }
        .history-item {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
            transition: all 0.3s ease;
        }
        .history-item:hover {
            background: #263449;
            border-color: #3b82f6;
            box-shadow: 0 5px 15px rgba(59, 130, 246, 0.3);
        }
        .status-badge {
            font-size: 0.9rem;
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: bold;
            display: inline-block;
        }
        .AN_TOAN {
            background-color: rgba(34, 197, 94, 0.2);
            color: #4ade80;
            border: 1px solid #22c55e;
        }
        .CANH_BAO {
            background-color: rgba(234, 179, 8, 0.2);
            color: #fde047;
            border: 1px solid #eab308;
        }
        .DOC_HAI {
            background-color: rgba(239, 68, 68, 0.2);
            color: #f87171;
            border: 1px solid #ef4444;
        }
        .KHONG_XAC_DINH {
            background-color: rgba(156, 163, 175, 0.2);
            color: #9ca3af;
            border: 1px solid #9ca3af;
        }
        .type-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            background: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
            border: 1px solid #3b82f6;
        }
        .time-text {
            font-size: 0.85rem;
            color: #94a3b8;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }
        .empty-state i {
            font-size: 3rem;
            color: #64748b;
            margin-bottom: 20px;
        }
        .detail-section {
            background: #0f172a;
            padding: 15px;
            border-radius: 8px;
            margin-top: 10px;
            border-left: 3px solid #3b82f6;
            font-size: 0.9rem;
            max-height: 200px;
            overflow-y: auto;
        }
        
    </style>
</head>
<body>

<div class="container">
    <!-- MENU GÓC PHẢI -->
    <div class="d-flex justify-content-end mt-4 mb-4">
        <div class="d-flex align-items-center gap-4 px-3 py-2 rounded"
             style="background: rgba(255,255,255,0.05); backdrop-filter: blur(8px);">

            <!-- Quay lại trang chủ -->
            <a href="/" class="menu-link">
                <i class="bi bi-house-fill"></i>
                <span>Trang chủ</span>
            </a>

            <!-- Tin tức -->
            <a href="user/news" class="menu-link">
                <i class="bi bi-newspaper"></i>
                <span>Tin tức</span>
            </a>
            <a href="/history" class="menu-link">
                <i class="bi bi-flag-fill"></i>
                <span>Lịch sử</span>
            </a>
            <!-- Báo cáo -->
            <a href="/report" class="menu-link">
                <i class="bi bi-flag-fill"></i>
                <span>Báo cáo</span>
            </a>

            <!-- Giới thiệu -->
            <a href="#" class="menu-link" onclick="showIntroductionModal(event)">
                <i class="bi bi-info-circle-fill"></i>
                <span>Giới thiệu</span>
            </a>

            <!-- Nút đăng nhập / Lịch sử & User -->
            <div id="authArea"></div>
        </div>
    </div>
    <div class="row justify-content-center">
        <div class="col-md-10">
            <div class="hero-box">
                <div class="d-flex align-items-center justify-content-between mb-30" style="margin-bottom: 30px;">
                    <h2 class="mb-0"><i class="bi bi-clock-history"></i> Lịch Sử Quét</h2>
                    <button class="btn btn-sm btn-outline-light" id="refreshBtn" onclick="loadHistory()">
                        <i class="bi bi-arrow-clockwise"></i> Làm mới
                    </button>
                </div>

                <!-- Filter/Sort options -->
                <div class="mb-4 d-flex gap-2 flex-wrap">
                    <select id="filterType" class="form-select form-select-sm" style="max-width: 150px; background: #334155; color: #f8fafc; border-color: #475569;">
                        <option value="">Tất cả loại</option>
                        <option value="url">URL</option>
                        <option value="file">File</option>
                    </select>
                    <select id="filterStatus" class="form-select form-select-sm" style="max-width: 150px; background: #334155; color: #f8fafc; border-color: #475569;">
                        <option value="">Tất cả trạng thái</option>
                        <option value="AN_TOAN">An toàn</option>
                        <option value="CANH_BAO">Cảnh báo</option>
                        <option value="DOC_HAI">Độc hại</option>
                        <option value="KHONG_XAC_DINH">Chưa xác định</option>
                    </select>
                </div>

                <!-- History list -->
                <div id="historyContainer">
                    <div class="empty-state">
                        <i class="bi bi-inbox"></i>
                        <p class="text-secondary">Chưa có lịch sử quét</p>
                    </div>
                </div>

                <div id="loadingSpinner" style="display: none; text-align: center; padding: 40px;">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Đang tải...</span>
                    </div>
                    <p class="text-secondary mt-3">Đang tải lịch sử...</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/js/header_menu.js"></script>
<script>
    const sb = window.supabase.createClient(
        "https://ddljfrzszcjtsenlgfqj.supabase.co",
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRkbGpmcnpzemNqdHNlbmxnZnFqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEzMzI5OTcsImV4cCI6MjA4NjkwODk5N30.id1F3yrnPEixcQIlq0knPOqPURdC9jSGhWbRcUzlwK8"
    );

    let currentUser = null;

    /* HIỂN THỊ USER */
    async function loadUser() {
        const { data: { user } } = await sb.auth.getUser();
        const authArea = document.getElementById("authArea");
        currentUser = user;

        if (!user) {
            authArea.innerHTML = `<a href="/auth/login" class="btn btn-outline-light" style="padding: 6px 12px; border-radius: 6px;">Đăng nhập</a>`;
            return;
        }

        authArea.innerHTML = `
            <div class="d-flex align-items-center gap-3">
                <a href="/history" class="menu-link" style="color: #3b82f6; background: rgba(59, 130, 246, 0.1);">
                    <i class="bi bi-clock-history"></i>
                    <span>Lịch sử</span>
                </a>
                <div class="position-relative d-flex align-items-center">
                    <i class="bi bi-person-circle fs-4 text-white" id="userIcon" style="cursor:pointer;"></i>
                    <div id="userTooltip" style="display:none; position:absolute; top:40px; right:0; background:#1e293b; padding:10px 15px; border-radius:8px; box-shadow:0 5px 15px rgba(0,0,0,0.5); white-space:nowrap; z-index:999;">
                        <div style="font-size:13px;">${user.email}</div>
                        <div onclick="confirmLogout()" style="cursor:pointer; font-size:13px; margin-top:6px;">Thoát</div>
                    </div>
                </div>
            </div>
        `;

        const icon = document.getElementById("userIcon");
        const tooltip = document.getElementById("userTooltip");

        if (icon && tooltip) {
            icon.onmouseenter = () => tooltip.style.display = "block";
            icon.onmouseleave = () => tooltip.style.display = "none";
            tooltip.onmouseenter = () => tooltip.style.display = "block";
            tooltip.onmouseleave = () => tooltip.style.display = "none";
        }
    }

    /* XÁC NHẬN LOGOUT */
    function confirmLogout() {
        const ok = confirm("Bạn có chắc chắn muốn thoát không?");
        if (ok) {
            logout();
        }
    }

    /* LOGOUT */
    async function logout() {
        await sb.auth.signOut();
        localStorage.clear();
        location.reload();
    }

    


    // Load history from database
    async function loadHistory() {
        if (!currentUser) return;

        document.getElementById('loadingSpinner').style.display = 'block';
        document.getElementById('historyContainer').innerHTML = '';

        try {
            const { data, error } = await sb
                .from('lich_su_quet')
                .select('*')
                .eq('ma_nguoi_dung', currentUser.id)
                .order('created_at', { ascending: false });

            document.getElementById('loadingSpinner').style.display = 'none';

            if (error) {
                console.error('Lỗi:', error);
                document.getElementById('historyContainer').innerHTML = `
                    <div class="alert alert-danger">Lỗi tải dữ liệu: ${error.message}</div>
                `;
                return;
            }

            if (!data || data.length === 0) {
                document.getElementById('historyContainer').innerHTML = `
                    <div class="empty-state">
                        <i class="bi bi-inbox"></i>
                        <p class="text-secondary">Chưa có lịch sử quét</p>
                    </div>
                `;
                return;
            }

            displayHistory(data);
        } catch (err) {
            console.error('Exception:', err);
            document.getElementById('loadingSpinner').style.display = 'none';
        }
    }

    // Display filtered history
    function displayHistory(historyData) {
        const filterType = document.getElementById('filterType').value;
        const filterStatus = document.getElementById('filterStatus').value;

        let filteredData = historyData;

        if (filterType) {
            filteredData = filteredData.filter(item => item.loai_quet === filterType);
        }

        if (filterStatus) {
            const statusMap = {
                'AN_TOAN': 'AN_TOAN',
                'CANH_BAO': 'CẢNH BÁO',
                'DOC_HAI': 'ĐỘC HẠI',
                'KHONG_XAC_DINH': 'CHƯA XÁC ĐỊNH'
            };
            filteredData = filteredData.filter(item => {
                const ket_qua = item.ket_qua === statusMap[filterStatus] || item.ket_qua === filterStatus;
                return ket_qua;
            });
        }

        if (filteredData.length === 0) {
            document.getElementById('historyContainer').innerHTML = `
                <div class="empty-state">
                    <i class="bi bi-search"></i>
                    <p class="text-secondary">Không tìm thấy kết quả</p>
                </div>
            `;
            return;
        }

        let html = '';
        filteredData.forEach(item => {
            const statusClass = getStatusClass(item.ket_qua);
            const typeIcon = item.loai_quet === 'url' ? '🔗' : '📁';
            const dateTime = new Date(item.created_at).toLocaleString('vi-VN');
            const details = item.du_lieu_chi_tiet || {};

            html += `
                <div class="history-item">
                    <div class="d-flex justify-content-between align-items-start mb-2">
                        <div class="flex-grow-1">
                            <div class="mb-2">
                                <span class="type-badge">${typeIcon} ${item.loai_quet === 'url' ? 'URL' : 'File'}</span>
                                <span class="status-badge ${statusClass} ms-2">${formatStatus(item.ket_qua)}</span>
                            </div>
                            <div style="word-break: break-all; margin-top: 8px;">
                                <strong>${escapeHtml(item.doi_tuong)}</strong>
                            </div>
                        </div>
                        <div style="text-align: right;">
                            <div class="time-text">${dateTime}</div>
                            <small class="text-warning" style="font-size: 0.8rem;">Điểm rủi ro: ${item.diem_rui_ro}/96</small>
                        </div>
                    </div>
                    ${item.huong_dan_khac_phuc ? `
                        <details class="mt-2" style="cursor: pointer;">
                            <summary class="text-info" style="font-size: 0.9rem;">📋 Chi tiết</summary>
                            <div class="detail-section mt-2">${item.huong_dan_khac_phuc}</div>
                        </details>
                    ` : ''}
                </div>
            `;
        });

        document.getElementById('historyContainer').innerHTML = html;
    }

    function getStatusClass(status) {
        if (status === 'ĐỘC HẠI' || status === 'DOC_HAI') return 'DOC_HAI';
        if (status === 'CẢNH BÁO' || status === 'CANH_BAO') return 'CANH_BAO';
        if (status === 'AN TOÀN' || status === 'AN_TOAN') return 'AN_TOAN';
        return 'KHONG_XAC_DINH';
    }

    function formatStatus(status) {
        if (status === 'ĐỘC HẠI' || status === 'DOC_HAI') return '🔴 ĐỘC HẠI';
        if (status === 'CẢNH BÁO' || status === 'CANH_BAO') return '🟡 CẢNH BÁO';
        if (status === 'AN TOÀN' || status === 'AN_TOAN') return '🟢 AN TOÀN';
        return '⚪ CHƯA XÁC ĐỊNH';
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // Event listeners for filters - handled in attachFilterListeners

    let allHistoryData = [];

    // Re-filter when filter changes
    async function attachFilterListeners() {
        const refresh = async () => {
            try {
                const { data } = await sb
                    .from('lich_su_quet')
                    .select('*')
                    .eq('ma_nguoi_dung', currentUser.id)
                    .order('created_at', { ascending: false });

                allHistoryData = data || [];
                displayHistory(allHistoryData);
            } catch (err) {
                console.error('Lỗi khi làm mới:', err);
            }
        };

        document.getElementById('filterType').addEventListener('change', refresh);
        document.getElementById('filterStatus').addEventListener('change', refresh);
    }

    // Initialize
    loadUser().then(() => {
        setTimeout(() => loadHistory(), 100);
        attachFilterListeners();
    });

    sb.auth.onAuthStateChange(() => {
        loadUser();
    });
</script>

</body>
</html>
