<div class="d-flex justify-content-end mt-4 mb-4">
    <div class="d-flex align-items-center gap-4 px-3 py-2 rounded"
         style="background: rgba(255,255,255,0.05); backdrop-filter: blur(8px);">

        <a href="/" class="menu-link">
            <i class="bi bi-house-fill"></i>
            <span>Trang chủ</span>
        </a>

        <a href="/user/news" class="menu-link {% if active_page == 'news' %}active-menu{% endif %}">
            <i class="bi bi-newspaper"></i>
            <span>Tin tức</span>
        </a>

        <a href="/history" class="menu-link {% if active_page == 'history' %}active-menu{% endif %}">
            <i class="bi bi-clock-history"></i>
            <span>Lịch sử</span>
        </a>

        <a href="/report" class="menu-link">
            <i class="bi bi-flag-fill"></i>
            <span>Báo cáo</span>
        </a>

        <a href="#" class="menu-link" onclick="showIntroductionModal(event)">
            <i class="bi bi-info-circle-fill"></i>
            <span>Giới thiệu</span>
        </a>

        <div id="authArea">
            <a href="/auth/login" class="btn btn-outline-light">Đăng nhập</a>
        </div>
    </div>
</div>

<style>
.menu-link {
    text-decoration: none;
    color: #f8fafc;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    transition: all 0.2s ease;
    padding: 6px 12px;
    border-radius: 6px;
}

.menu-link:hover {
    color: #3b82f6;
    background: rgba(59, 130, 246, 0.1);
}

.menu-link.active-menu {
    color: #3b82f6;
    background: rgba(59, 130, 246, 0.1);
}

.dropdown-menu {
    background-color: #1e293b;
    border: 1px solid #334155;
}
.dropdown-item {
    color: #e2e8f0;
}
.dropdown-item:hover {
    background-color: #334155;
    color: #ffffff;
}
</style>

<script>
    // Hàm load thông tin user từ server
    async function loadUserHeader() {
        const authArea = document.getElementById("authArea");
        if (!authArea) return;

        try {
            const response = await fetch('/auth/status');
            const data = await response.json();

            if (!data.logged_in) {
                authArea.innerHTML = `<a href="/auth/login" class="btn btn-outline-light">Đăng nhập</a>`;
                return;
            }

            // Hiển thị dropdown
            authArea.innerHTML = `
                <div class="dropdown">
                    <button
                        class="btn btn-outline-light dropdown-toggle d-flex align-items-center gap-2"
                        type="button"
                        id="userMenu"
                        data-bs-toggle="dropdown"
                        aria-expanded="false"
                    >
                        <i class="bi bi-person-circle"></i>
                        <span>${escapeHtml(data.username || data.email || 'Người dùng')}</span>
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="userMenu">
                        <li><a class="dropdown-item" href="/profile/"><i class="bi bi-person me-2"></i>Trang cá nhân</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item" href="#" onclick="confirmLogout(event)"><i class="bi bi-box-arrow-right me-2"></i>Đăng xuất</a></li>
                    </ul>
                </div>
            `;
        } catch (err) {
            console.error("Load user header error:", err);
            authArea.innerHTML = `<a href="/auth/login" class="btn btn-outline-light">Đăng nhập</a>`;
        }
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function confirmLogout(event) {
        event.preventDefault();
        if (confirm("Bạn có chắc chắn muốn thoát không?")) {
            logout();
        }
    }

    async function logout() {
        await fetch('/auth/logout', { method: 'POST' });
        window.location.href = '/';
    }

    function showIntroductionModal(event) {
        event.preventDefault();
        alert("Giới thiệu hệ thống - Hãy xem trang chủ để biết thêm chi tiết");
    }

    // Đợi DOM tải xong mới chạy
    document.addEventListener('DOMContentLoaded', loadUserHeader);
</script>
